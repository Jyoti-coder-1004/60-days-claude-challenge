<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Think Like a Marketing Strategist: Grow This Brand</title>
<style>
  :root{
    --bg: #0b0e14;
    --bg-elev: #10141d;
    --card: #171c27;
    --card-hover: #1c2230;
    --border: #262c3a;
    --border-soft: #1e2430;
    --text: #e8ecf4;
    --text-dim: #9aa4b8;
    --text-faint: #626c81;
    --indigo: #7c8cff;
    --indigo-dim: #4a4f8a;
    --teal: #34d3ac;
    --amber: #f2b705;
    --coral: #ff6b6b;
    --mono: ui-monospace, "SFMono-Regular", "Consolas", "Liberation Mono", monospace;
    --sans: -apple-system, "Segoe UI", "Inter", system-ui, Roboto, sans-serif;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:
      radial-gradient(1200px 600px at 15% -10%, rgba(124,140,255,0.10), transparent 60%),
      radial-gradient(900px 500px at 100% 10%, rgba(52,211,172,0.06), transparent 60%),
      var(--bg);
    color:var(--text);
    font-family:var(--sans);
    min-height:100vh;
    -webkit-font-smoothing:antialiased;
  }
  #root{min-height:100vh;display:flex;flex-direction:column;}

  .app-shell{
    max-width:920px;
    width:100%;
    margin:0 auto;
    padding:28px 20px 60px;
    flex:1;
    display:flex;
    flex-direction:column;
  }

  /* ---------- Header / brand mark ---------- */
  .brandbar{
    display:flex;
    align-items:center;
    justify-content:space-between;
    margin-bottom:22px;
  }
  .brandmark{
    display:flex;
    align-items:center;
    gap:10px;
    font-family:var(--mono);
    font-size:12px;
    letter-spacing:0.14em;
    text-transform:uppercase;
    color:var(--text-faint);
  }
  .brandmark .dot{width:7px;height:7px;border-radius:50%;background:var(--teal);box-shadow:0 0 8px var(--teal);}
  .case-id{
    font-family:var(--mono);
    font-size:11px;
    color:var(--text-faint);
    letter-spacing:0.08em;
    border:1px solid var(--border);
    padding:4px 10px;
    border-radius:100px;
  }

  /* ---------- Case-file tab progress nav ---------- */
  .tabnav{
    display:flex;
    gap:4px;
    overflow-x:auto;
    margin-bottom:26px;
    padding-bottom:2px;
  }
  .tab{
    flex:0 0 auto;
    font-family:var(--mono);
    font-size:10.5px;
    letter-spacing:0.06em;
    text-transform:uppercase;
    color:var(--text-faint);
    background:var(--bg-elev);
    border:1px solid var(--border-soft);
    border-bottom:none;
    padding:8px 12px 7px;
    border-radius:8px 8px 0 0;
    position:relative;
    top:1px;
    white-space:nowrap;
    transition:all .25s ease;
  }
  .tab.active{
    color:var(--text);
    background:var(--card);
    border-color:var(--indigo);
    box-shadow:0 -2px 0 var(--indigo) inset;
  }
  .tab.done{color:var(--teal);}

  /* ---------- Screen transition ---------- */
  .screen{
    animation:fadeSlideIn .45s cubic-bezier(.2,.8,.2,1);
  }
  @keyframes fadeSlideIn{
    from{opacity:0; transform:translateY(10px);}
    to{opacity:1; transform:translateY(0);}
  }

  h1,h2,h3{font-family:var(--sans); font-weight:700; letter-spacing:-0.01em; margin:0;}
  .eyebrow{
    font-family:var(--mono);
    font-size:11px;
    letter-spacing:0.16em;
    text-transform:uppercase;
    color:var(--indigo);
    margin-bottom:10px;
    display:block;
  }
  p{color:var(--text-dim); line-height:1.6; margin:0 0 12px;}

  /* ---------- Cards ---------- */
  .card{
    background:var(--card);
    border:1px solid var(--border);
    border-radius:14px;
    padding:20px 22px;
    margin-bottom:16px;
  }
  .card-accent{border-left:3px solid var(--indigo);}
  .card-accent.teal{border-left-color:var(--teal);}
  .card-accent.amber{border-left-color:var(--amber);}
  .card-accent.coral{border-left-color:var(--coral);}

  .grid{display:grid; gap:14px;}
  .grid-2{grid-template-columns:repeat(auto-fit,minmax(240px,1fr));}

  /* ---------- Buttons ---------- */
  .btn{
    font-family:var(--sans);
    font-weight:600;
    font-size:14.5px;
    color:var(--text);
    background:var(--card-hover);
    border:1px solid var(--border);
    padding:11px 20px;
    border-radius:10px;
    cursor:pointer;
    transition:all .2s ease;
  }
  .btn:hover{border-color:var(--indigo); transform:translateY(-1px);}
  .btn:active{transform:translateY(0);}
  .btn:disabled{opacity:0.4; cursor:not-allowed; transform:none;}
  .btn-primary{
    background:linear-gradient(135deg, var(--indigo), #5a63d8);
    border:none;
    color:#0b0e14;
    font-weight:700;
    color:#fff;
  }
  .btn-primary:hover{filter:brightness(1.1);}
  .btn-ghost{background:transparent;}
  .btn-row{display:flex; gap:10px; flex-wrap:wrap; margin-top:18px;}

  /* ---------- Choice cards (welcome/mode select) ---------- */
  .choice-card{
    background:var(--card);
    border:1px solid var(--border);
    border-radius:16px;
    padding:24px;
    cursor:pointer;
    transition:all .25s ease;
    text-align:left;
  }
  .choice-card:hover{
    border-color:var(--indigo);
    background:var(--card-hover);
    transform:translateY(-3px);
  }
  .choice-icon{font-size:28px; margin-bottom:10px; display:block;}
  .choice-title{font-size:17px; font-weight:700; margin-bottom:6px;}
  .choice-desc{font-size:13.5px; color:var(--text-dim); margin:0;}

  /* ---------- Form ---------- */
  label{display:block; font-size:12.5px; color:var(--text-dim); margin-bottom:6px; font-weight:600;}
  input[type=text], select, textarea{
    width:100%;
    background:var(--bg-elev);
    border:1px solid var(--border);
    color:var(--text);
    padding:10px 12px;
    border-radius:9px;
    font-family:var(--sans);
    font-size:14px;
    margin-bottom:14px;
  }
  input[type=text]:focus, select:focus, textarea:focus{outline:2px solid var(--indigo); border-color:transparent;}
  textarea{min-height:70px; resize:vertical;}

  /* ---------- Selectable tiles (platforms/pillars) ---------- */
  .pick-card{
    background:var(--card);
    border:1px solid var(--border);
    border-radius:14px;
    padding:16px 18px;
    cursor:pointer;
    transition:all .2s ease;
    position:relative;
  }
  .pick-card:hover{border-color:var(--indigo-dim);}
  .pick-card.selected{
    border-color:var(--teal);
    background:linear-gradient(135deg, rgba(52,211,172,0.08), rgba(52,211,172,0.02));
  }
  .pick-card.locked{opacity:0.4; cursor:not-allowed;}
  .pick-check{
    position:absolute; top:14px; right:14px;
    width:20px;height:20px;border-radius:50%;
    border:2px solid var(--border);
    display:flex;align-items:center;justify-content:center;
    font-size:12px;color:var(--bg);
  }
  .pick-card.selected .pick-check{background:var(--teal); border-color:var(--teal); color:#0b0e14; font-weight:900;}
  .fit-badge{
    display:inline-block;
    font-family:var(--mono);
    font-size:10px;
    letter-spacing:0.06em;
    text-transform:uppercase;
    padding:2px 8px;
    border-radius:100px;
    margin-top:8px;
  }
  .fit-strong{background:rgba(52,211,172,0.15); color:var(--teal);}
  .fit-moderate{background:rgba(242,183,5,0.15); color:var(--amber);}
  .fit-weak{background:rgba(255,107,107,0.15); color:var(--coral);}

  .goal-tag{
    font-family:var(--mono);
    font-size:10px;
    color:var(--text-faint);
    letter-spacing:0.05em;
    text-transform:uppercase;
  }

  /* ---------- Ask Claude card ---------- */
  .ask-card{
    background:var(--bg-elev);
    border:1px dashed var(--indigo-dim);
    border-radius:12px;
    padding:16px 18px;
    margin-top:6px;
  }
  .ask-header{
    display:flex; align-items:center; justify-content:space-between;
    margin-bottom:10px;
  }
  .ask-title{
    font-family:var(--mono);
    font-size:11.5px;
    letter-spacing:0.08em;
    text-transform:uppercase;
    color:var(--indigo);
  }
  .ask-prompt{
    font-family:var(--mono);
    font-size:12.5px;
    color:var(--text-dim);
    line-height:1.7;
    white-space:pre-wrap;
    margin:0 0 12px;
    background:var(--bg);
    padding:12px 14px;
    border-radius:8px;
    border:1px solid var(--border-soft);
  }
  .copy-btn{
    font-family:var(--mono);
    font-size:11.5px;
    background:transparent;
    border:1px solid var(--border);
    color:var(--text-dim);
    padding:6px 12px;
    border-radius:100px;
    cursor:pointer;
  }
  .copy-btn:hover{border-color:var(--teal); color:var(--teal);}

  /* ---------- Stamp ---------- */
  .stamp{
    display:inline-block;
    font-family:var(--mono);
    font-size:12px;
    letter-spacing:0.12em;
    text-transform:uppercase;
    color:var(--teal);
    border:2px solid var(--teal);
    padding:6px 14px;
    border-radius:6px;
    transform:rotate(-4deg);
    margin-bottom:10px;
  }

  /* ---------- Week roadmap ---------- */
  .week-card{
    display:grid;
    grid-template-columns:64px 1fr;
    gap:16px;
    background:var(--card);
    border:1px solid var(--border);
    border-radius:14px;
    padding:18px 20px;
    margin-bottom:12px;
  }
  .week-num{
    font-family:var(--mono);
    font-size:26px;
    font-weight:700;
    color:var(--indigo);
    line-height:1;
  }
  .week-num span{display:block; font-size:9px; color:var(--text-faint); letter-spacing:0.1em; margin-top:4px;}
  .week-strategy{margin:0; padding-left:18px; color:var(--text-dim); font-size:13.5px; line-height:1.7;}

  /* ---------- Report grid ---------- */
  .report-item h3{font-size:14px; margin-bottom:6px;}
  .report-item p{font-size:13.5px;}

  /* ---------- misc ---------- */
  .chip{
    display:inline-block;
    background:var(--bg-elev);
    border:1px solid var(--border);
    color:var(--text-dim);
    font-size:12px;
    padding:4px 10px;
    border-radius:100px;
    margin:0 6px 6px 0;
  }
  .divider{height:1px; background:var(--border); margin:20px 0; border:none;}
  .footer-note{
    text-align:center;
    color:var(--text-faint);
    font-size:12px;
    margin-top:30px;
    font-family:var(--mono);
  }
  .lesson-list{margin:0; padding-left:20px; color:var(--text-dim); line-height:1.8; font-size:13.5px;}
  .radio-row{
    display:flex; align-items:flex-start; gap:12px;
    background:var(--card); border:1px solid var(--border); border-radius:12px;
    padding:14px 16px; margin-bottom:10px; cursor:pointer; transition:all .2s ease;
  }
  .radio-row:hover{border-color:var(--indigo-dim);}
  .radio-row.chosen{border-color:var(--indigo); background:var(--card-hover);}
  .radio-dot{
    width:18px;height:18px;min-width:18px;border-radius:50%;border:2px solid var(--border);
    margin-top:2px;
  }
  .radio-row.chosen .radio-dot{border-color:var(--indigo); background:radial-gradient(circle, var(--indigo) 40%, transparent 42%);}
  .consequence{
    margin-top:10px; padding:12px 14px; border-radius:10px;
    font-size:13.5px; line-height:1.6;
    background:var(--bg-elev); border:1px solid var(--border-soft); color:var(--text-dim);
  }
  .consequence.good{border-color:var(--teal); color:var(--teal);}
  .consequence.bad{border-color:var(--coral); color:var(--coral);}
  .consequence.neutral{border-color:var(--amber); color:var(--amber);}

  ::-webkit-scrollbar{height:6px; width:6px;}
  ::-webkit-scrollbar-thumb{background:var(--border); border-radius:10px;}

  @media(max-width:640px){
    .week-card{grid-template-columns:40px 1fr;}
    .week-num{font-size:18px;}
  }
</style>
</head>

/* ============================================================
   HELPERS
   ============================================================ */
function pick(arr){ return arr[Math.floor(Math.random()*arr.length)]; }
function shuffle(arr){ const a=[...arr]; for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } return a; }

function generateRandomBusiness(){
  const idx = Math.floor(Math.random()*INDUSTRIES.length);
  const ind = INDUSTRIES[idx];
  return {
    name: ind.name + " Co.",
    industry: ind.name,
    audience: ind.audience,
    budget: pick(BUDGETS),
    admired: COMPETITOR_SETS[idx] || pick(COMPETITOR_SETS),
    admiredLabel: "Top Competitors",
    challenge: pick(CHALLENGES),
    tags: ind.tags
  };
}

function fitScore(platform, mode, profile){
  const tags = profile.tags || [];
  if(mode === 'personal'){
    let score = platform.personalWeight;
    if(tags.some(t=>platform.tagsGood.includes(t))) score += 2;
    if(tags.some(t=>platform.tagsBad.includes(t))) score -= 2;
    return score;
  }
  let score = 0;
  score += tags.filter(t=>platform.tagsGood.includes(t)).length * 2;
  score -= tags.filter(t=>platform.tagsBad.includes(t)).length * 2;
  return score;
}
function fitLabel(score){
  if(score >= 5) return 'Strong Fit';
  if(score >= 2) return 'Moderate Fit';
  return 'Weak Fit';
}
function fitClass(label){
  if(label==='Strong Fit') return 'fit-strong';
  if(label==='Moderate Fit') return 'fit-moderate';
  return 'fit-weak';
}
function fitReason(platform, mode, profile, label){
  const name = mode==='personal' ? (profile.name||'you') : profile.industry;
  if(label === 'Strong Fit'){
    return `A strong match — ${platform.blurb} That lines up well with ${mode==='personal' ? "your niche and goals." : `a ${profile.industry.toLowerCase()} audience like yours.`}`;
  }
  if(label === 'Moderate Fit'){
    return `A workable option — ${platform.blurb} It can work here, but it isn't the most natural fit for ${mode==='personal' ? "this niche" : "this audience"}.`;
  }
  return `Probably not the priority — ${platform.blurb} It tends to work less well for ${mode==='personal' ? "this kind of niche" : "this kind of audience"}, so budget and time are better spent elsewhere.`;
}

  const isPersonal = mode==='personal';
  const prompt = isPersonal
    ? `Build me a 30-day content roadmap (by week, not individual posts) for my personal brand as ${profile.name||'[name]'} in "${profile.niche||profile.industry}", using these platforms: ${platformNames.join(', ')}, and these content pillars: ${pillarNames.join(', ')}. Week 1 should focus on defining my point of view and optimizing my bio/profile.`
    : `Build me a 30-day content roadmap (by week, not individual posts) for my ${profile.industry} business, using these platforms: ${platformNames.join(', ')}, and these content pillars: ${pillarNames.join(', ')}. Tie each week's goal to the challenge: "${profile.challenge}".`;

  return (
    <div className="screen">
      <span className="eyebrow">Step 5 · 30-Day Roadmap</span>
      <h2 style={{fontSize:'24px', marginBottom:'8px'}}>A month of strategy, week by week</h2>

      <WhatWhy
        what="A roadmap is a set of weekly goals and strategic focuses — not a list of individual posts to publish."
        why="Planning by week keeps the strategy flexible (exact posts can change) while keeping the direction consistent (the goal for the week doesn't)."
      />

      {weeks.map((w,i)=>(
        <div className="week-card" key={i}>
          <div className="week-num">{i+1}<span>WEEK</span></div>
          <div>
            <h3 style={{fontSize:'15.5px', marginBottom:'4px'}}>{w.title}</h3>
            <p style={{fontSize:'13px', marginBottom:'8px'}}><em>{w.goal}</em></p>
            <ul className="week-strategy">
              {w.bullets.map((b,j)=><li key={j}>{b}</li>)}
            </ul>
          </div>
        </div>
      ))}

      <AskClaudeCard prompt={prompt} />

      <div className="btn-row">
        <button className="btn btn-primary" onClick={onNext}>Face the Curveball →</button>
      </div>
    </div>
  );
}

function EventScreen({ mode, profile, event, onRespond, onNext, chosenIndex }){
  const isPersonal = mode==='personal';
  const chosen = chosenIndex!=null ? event.choices[chosenIndex] : null;
  const prompt = isPersonal
    ? `As a personal brand strategist, help me think through how to respond to this situation: "${event.title} — ${event.desc}" I'm ${profile.name||'[name]'}, known for "${profile.niche||profile.industry}". What are the risks and benefits of each realistic response?`
    : `As a marketing strategist, help me think through how to respond to this situation for my ${profile.industry} business: "${event.title} — ${event.desc}" What are the risks and benefits of each realistic response?`;

  return (
    <div className="screen">
      <span className="eyebrow">Step 6 · The Unexpected</span>
      <h2 style={{fontSize:'24px', marginBottom:'8px'}}>{event.title}</h2>

      <WhatWhy
        what="Strategy isn't just the plan — it's also how you react when something outside the plan happens."
        why="Viral moments, copycats, competitor moves, and public disagreements all test judgment in real time. How you respond can build or damage everything built so far."
      />

      <div className="card card-accent coral">
        <p style={{margin:0}}>{event.desc}</p>
      </div>

      {event.choices.map((c,i)=>(
        <div key={i} className={"radio-row" + (chosenIndex===i ? " chosen":"")} onClick={()=>onRespond(i)}>
          <div className="radio-dot"></div>
          <div>
            <div>{c.label}</div>
            {chosenIndex===i && (
              <div className={"consequence " + c.quality}>{c.consequence}</div>
            )}
          </div>
        </div>
      ))}

      <AskClaudeCard prompt={prompt} />

      <div className="btn-row">
        <button className="btn btn-primary" disabled={chosenIndex==null} onClick={onNext}>See the Growth Report →</button>
      </div>
    </div>
  );
}

function ReportScreen({ mode, profile, platformIds, pillarIds, event, chosenIndex, onRestart }){
  const isPersonal = mode==='personal';
  const platformObjs = platformIds.map(id=>PLATFORMS.find(p=>p.id===id));
  const pillarPool = isPersonal ? PERSONAL_PILLARS : BUSINESS_PILLARS;
  const pillarObjs = pillarIds.map(id=>pillarPool.find(p=>p.id===id));
  const eventChoice = event.choices[chosenIndex];

  const fitData = platformObjs.map(p=>{
    const score = fitScore(p, mode, profile);
    return { p, label: fitLabel(score) };
  });
  const strongCount = fitData.filter(d=>d.label==='Strong Fit').length;
  const weakOnes = fitData.filter(d=>d.label==='Weak Fit');
  const moderateCount = fitData.filter(d=>d.label==='Moderate Fit').length;

  let growthScore = strongCount*2 + moderateCount - weakOnes.length*2;
  if(eventChoice.quality==='good') growthScore += 2;
  if(eventChoice.quality==='bad') growthScore -= 2;
  const growthLabel = growthScore>=6 ? "High Growth Potential" : growthScore>=2 ? "Steady, Moderate Growth Potential" : "Developing — Needs Course Correction";

  let bestDecision;
  if(eventChoice.quality==='good'){
    bestDecision = `Choosing to respond with: "${eventChoice.label}" — ${eventChoice.consequence}`;
  } else {
    const best = fitData.sort((a,b)=> (b.label==='Strong Fit')-(a.label==='Strong Fit'))[0];
    bestDecision = `Prioritizing ${best.p.name} — ${best.p.blurb} It was the strongest platform match for this ${isPersonal ? "niche":"audience"}.`;
  }

  let biggestMistake;
  if(weakOnes.length>0){
    biggestMistake = `Including ${weakOnes.map(w=>w.p.name).join(' and ')} in the core 3 platforms — the audience data didn't strongly support it, and that time/budget could work harder elsewhere.`;
  } else if(eventChoice.quality==='bad'){
    biggestMistake = `The response chosen to "${event.title}" — ${eventChoice.consequence}`;
  } else {
    biggestMistake = "No major mistake yet — the real test now is staying consistent for months, not just weeks.";
  }

  const lessonsPool = isPersonal ? PERSONAL_LESSONS : BUSINESS_LESSONS;
  const lessons = useMemo(()=>shuffle(lessonsPool).slice(0,3), [mode]);

  const finalPrompt = isPersonal
    ? `Act as my ongoing personal branding strategist and accountability partner. My niche is "${profile.niche||profile.industry}" and I'm focused on ${platformObjs.map(p=>p.name).join(', ')} with content pillars: ${pillarObjs.map(p=>p.name).join(', ')}. Check in with me weekly on progress and help me adjust the strategy as things change.`
    : `Act as my ongoing marketing strategist. My business is ${profile.name} in ${profile.industry}, focused on ${platformObjs.map(p=>p.name).join(', ')} with content pillars: ${pillarObjs.map(p=>p.name).join(', ')}. Check in with me monthly on results and help me adjust the strategy based on what's working.`;

  return (
    <div className="screen">
      <span className="eyebrow">Step 7 · Final Growth Report</span>
      <span className="stamp">Strategy Reviewed</span>
      <h2 style={{fontSize:'24px', marginBottom:'16px'}}>{profile.name || profile.niche} — Growth Report</h2>

      <div className="grid grid-2">
        <div className="card report-item">
          <h3>Audience Understanding</h3>
          <p>{profile.audience}</p>
        </div>
        <div className="card report-item">
          <h3>Platform Strategy</h3>
          <p>{platformObjs.map(p=>p.name).join(', ')} — chosen for fit with {isPersonal ? "this niche" : "this audience"}, not by trend.</p>
        </div>
        <div className="card report-item">
          <h3>Content Strategy</h3>
          <p>{pillarObjs.map(p=>p.name).join(', ')}, each supporting a different part of the journey.</p>
        </div>
        <div className="card report-item">
          <h3>Growth Potential</h3>
          <p><strong style={{color:'var(--teal)'}}>{growthLabel}</strong> — based on platform fit and how the unexpected moment was handled.</p>
        </div>
        <div className="card report-item card-accent teal">
          <h3>Best Decision</h3>
          <p>{bestDecision}</p>
        </div>
        <div className="card report-item card-accent coral">
          <h3>Biggest Mistake</h3>
          <p>{biggestMistake}</p>
        </div>
      </div>

      <div className="card">
        <h3 style={{marginBottom:'8px'}}>Three Marketing Lessons</h3>
        <ul className="lesson-list">
          {lessons.map((l,i)=><li key={i}>{l}</li>)}
        </ul>
      </div>

      <AskClaudeCard prompt={finalPrompt} />

      <div className="btn-row">
        <button className="btn btn-primary" onClick={onRestart}>🔁 Start a New Case</button>
      </div>
      <p className="footer-note">Case closed. Every real brand — including yours — deserves this same thinking.</p>
    </div>
  );
}

/* ============================================================
   APP
   ============================================================ */
function App(){
  const [screen, setScreen] = useState('welcome'); // welcome | choice | main
  const [step, setStep] = useState('setup');
  const [mode, setMode] = useState(null);
  const [profile, setProfile] = useState(null);
  const [platformIds, setPlatformIds] = useState([]);
  const [pillarIds, setPillarIds] = useState([]);
  const [event, setEvent] = useState(null);
  const [eventChoice, setEventChoice] = useState(null);
  const [caseId] = useState(()=>Math.floor(1000+Math.random()*8999));

  const startFlow = () => setScreen('choice');
  const pickMode = (m) => {
    setMode(m==='random' ? 'business' : m);
    setScreen('main');
    setStep('setup');
  };
  const onProfileReady = (p) => { setProfile(p); setStep('understand'); };

  const goPlatforms = () => setStep('platforms');
  const goPillars = () => setStep('pillars');
  const goRoadmap = () => setStep('roadmap');
  const goEvent = () => {
    const pool = mode==='personal' ? PERSONAL_EVENTS : BUSINESS_EVENTS;
    setEvent(pick(pool));
    setEventChoice(null);
    setStep('event');
  };
  const goReport = () => setStep('report');

  const restart = () => {
    setScreen('choice');
    setStep('setup');
    setMode(null);
    setProfile(null);
    setPlatformIds([]);
    setPillarIds([]);
    setEvent(null);
    setEventChoice(null);
  };

  const platformNames = platformIds.map(id=>PLATFORMS.find(p=>p.id===id).name);
  const pillarPool = mode==='personal' ? PERSONAL_PILLARS : BUSINESS_PILLARS;
  const pillarNames = pillarIds.map(id=>pillarPool.find(p=>p.id===id).name);

  return (
    <div className="app-shell">
      <div className="brandbar">
        <div className="brandmark"><span className="dot"></span>Strategist Sim</div>
        <div className="case-id">CASE #{caseId}</div>
      </div>

      {screen==='welcome' && <Welcome onStart={startFlow} />}
      {screen==='choice' && <ChoiceScreen onPick={pickMode} />}

      {screen==='main' && (
        <React.Fragment>
          <TabNav step={step} />
          {step==='setup' && <SetupScreen key={"setup-"+mode} mode={mode} onProfileReady={onProfileReady} />}
          {step==='understand' && profile && <UnderstandScreen key="understand" mode={mode} profile={profile} onNext={goPlatforms} />}
          {step==='platforms' && profile && (
            <PlatformsScreen key="platforms" mode={mode} profile={profile} selected={platformIds} setSelected={setPlatformIds} onNext={goPillars} />
          )}
          {step==='pillars' && profile && (
            <PillarsScreen key="pillars" mode={mode} profile={profile} selected={pillarIds} setSelected={setPillarIds} onNext={goRoadmap} />
          )}
          {step==='roadmap' && profile && (
            <RoadmapScreen key="roadmap" mode={mode} profile={profile} platformNames={platformNames} pillarNames={pillarNames} onNext={goEvent} />
          )}
          {step==='event' && profile && event && (
            <EventScreen key="event" mode={mode} profile={profile} event={event} chosenIndex={eventChoice} onRespond={setEventChoice} onNext={goReport} />
          )}
          {step==='report' && profile && event && eventChoice!=null && (
            <ReportScreen key="report" mode={mode} profile={profile} platformIds={platformIds} pillarIds={pillarIds} event={event} chosenIndex={eventChoice} onRestart={restart} />
          )}
        </React.Fragment>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
