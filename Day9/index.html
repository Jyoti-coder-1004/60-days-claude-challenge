```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NutriScope</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
:root{
--bg:#0f172a;
--card:#111827;
--card2:#1f2937;
--accent:#22c55e;
--accent2:#38bdf8;
--text:#f8fafc;
--muted:#94a3b8;
--danger:#ef4444;
--border:#334155;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Inter,Segoe UI,sans-serif;
}

body{
background:linear-gradient(135deg,#0f172a,#020617);
color:var(--text);
padding:20px;
}

.container{
max-width:1400px;
margin:auto;
}

h1{
font-size:2rem;
margin-bottom:20px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
gap:20px;
margin-bottom:20px;
}

.card{
background:rgba(17,24,39,.95);
border:1px solid var(--border);
border-radius:18px;
padding:20px;
backdrop-filter:blur(10px);
}

.card h2{
margin-bottom:15px;
font-size:1.1rem;
}

label{
display:block;
margin-bottom:6px;
font-size:.9rem;
color:var(--muted);
}

input,select{
width:100%;
padding:12px;
border-radius:10px;
border:1px solid var(--border);
background:#0f172a;
color:white;
margin-bottom:12px;
}

button{
background:var(--accent);
border:none;
padding:12px 16px;
border-radius:10px;
font-weight:600;
cursor:pointer;
color:white;
}

button:hover{
opacity:.9;
}

table{
width:100%;
border-collapse:collapse;
margin-top:10px;
}

th,td{
padding:10px;
border-bottom:1px solid var(--border);
text-align:center;
}

.progress{
height:16px;
background:#1e293b;
border-radius:20px;
overflow:hidden;
}

.progress-fill{
height:100%;
background:linear-gradient(90deg,var(--accent),var(--accent2));
width:0%;
}

.metric{
margin-bottom:15px;
}

.metric strong{
display:block;
margin-bottom:5px;
}

.list{
margin-top:10px;
}

.list li{
margin-bottom:8px;
}

.dashboard-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
}

@media(max-width:900px){
.dashboard-grid{
grid-template-columns:1fr;
}
table{
font-size:.8rem;
}
}
</style>
</head>
<body>

<div class="container">

<h1>🥗 NutriScope</h1>

<div class="grid">

<div class="card">
<h2>Profile</h2>

<label>Age</label>
<input type="number" id="age" value="20">

<label>Gender</label>
<select id="gender">
<option>Male</option>
<option>Female</option>
</select>

<label>Height (cm)</label>
<input type="number" id="height" value="170">

<label>Weight (kg)</label>
<input type="number" id="weight" value="70">

<label>Activity Level</label>
<select id="activity">
<option value="1.2">Sedentary</option>
<option value="1.375">Light</option>
<option value="1.55" selected>Moderate</option>
<option value="1.725">Active</option>
<option value="1.9">Very Active</option>
</select>

<label>Dietary Preference</label>
<select id="diet">
<option>Vegetarian</option>
<option>Non-Vegetarian</option>
<option>Eggetarian</option>
</select>

</div>

<div class="card">
<h2>Food Logging</h2>

<label>Food</label>
<select id="food"></select>

<label>Quantity</label>
<input type="number" id="qty" value="100">

<label>Unit</label>
<select id="unit">
<option>g</option>
<option>ml</option>
<option>piece</option>
</select>

<button onclick="addFood()">Add Food</button>

<table id="foodTable">
<thead>
<tr>
<th>Food</th>
<th>Qty</th>
<th>Unit</th>
<th>Remove</th>
</tr>
</thead>
<tbody></tbody>
</table>

</div>

</div>

<div class="dashboard-grid">

<div class="card">
<h2>Energy Progress</h2>

<div class="metric">
<strong id="energyText">0 / 0 kcal</strong>
<div class="progress">
<div class="progress-fill" id="energyBar"></div>
</div>
</div>

<canvas id="macroChart"></canvas>

</div>

<div class="card">
<h2>Recommendations</h2>
<ul id="recommendations" class="list"></ul>
</div>

</div>

<div class="card">
<h2>Nutrient Dashboard</h2>

<div class="grid">
<div>
<h3>Top Deficiencies</h3>
<ul id="deficiencies"></ul>
</div>

<div>
<h3>Top Excesses</h3>
<ul id="excesses"></ul>
</div>
</div>

<table id="nutrientTable">
<thead>
<tr>
<th>Nutrient</th>
<th>Consumed</th>
<th>Target</th>
<th>%</th>
</tr>
</thead>
<tbody></tbody>
</table>

</div>

</div>

<script>

const foods = {
Rice:{cal:130,protein:2.7,carbs:28,fat:0.3,fiber:0.4,iron:0.2,calcium:10,vitc:0,vitd:0,b12:0},
Roti:{cal:120,protein:4,carbs:22,fat:1,fiber:3,iron:1.2,calcium:15,vitc:0,vitd:0,b12:0},
Dal:{cal:116,protein:9,carbs:20,fat:0.4,fiber:8,iron:3.3,calcium:19,vitc:2,vitd:0,b12:0},
Paneer:{cal:265,protein:18,carbs:2,fat:20,fiber:0,iron:0.2,calcium:208,vitc:0,vitd:0.1,b12:0.8},
Curd:{cal:98,protein:11,carbs:4,fat:4,fiber:0,iron:0.1,calcium:120,vitc:1,vitd:0.1,b12:0.4},
Chana:{cal:164,protein:9,carbs:27,fat:2.6,fiber:8,iron:2.9,calcium:49,vitc:1.3,vitd:0,b12:0},
Rajma:{cal:127,protein:8.7,carbs:22.8,fat:0.5,fiber:6.4,iron:2.9,calcium:28,vitc:0,b12:0,vitd:0},
Banana:{cal:89,protein:1.1,carbs:23,fat:0.3,fiber:2.6,iron:0.3,calcium:5,vitc:9,vitd:0,b12:0},
Apple:{cal:52,protein:0.3,carbs:14,fat:0.2,fiber:2.4,iron:0.1,calcium:6,vitc:4.6,vitd:0,b12:0},
Milk:{cal:61,protein:3.2,carbs:5,fat:3.3,fiber:0,iron:0.03,calcium:113,vitc:0,vitd:1,b12:0.5},
Oats:{cal:389,protein:17,carbs:66,fat:7,fiber:10,iron:4.7,calcium:54,vitc:0,b12:0,vitd:0},
Bread:{cal:265,protein:9,carbs:49,fat:3.2,fiber:2.7,iron:3.6,calcium:107,vitc:0,b12:0,vitd:0},
Egg:{cal:155,protein:13,carbs:1.1,fat:11,fiber:0,iron:1.8,calcium:50,vitc:0,vitd:2,b12:1.1},
Chicken:{cal:239,protein:27,carbs:0,fat:14,fiber:0,iron:1.3,calcium:15,vitc:0,vitd:0.1,b12:0.3},
Fish:{cal:206,protein:22,carbs:0,fat:12,fiber:0,iron:0.8,calcium:20,vitc:0,vitd:5,b12:2.4},
Potato:{cal:77,protein:2,carbs:17,fat:0.1,fiber:2.2,iron:0.8,calcium:12,vitc:19,b12:0,vitd:0},
Poha:{cal:130,protein:2.5,carbs:24,fat:3,fiber:1.5,iron:2.5,calcium:10,vitc:5,b12:0,vitd:0},
Idli:{cal:58,protein:2,carbs:12,fat:0.4,fiber:0.5,iron:0.3,calcium:10,vitc:0,b12:0,vitd:0},
Dosa:{cal:168,protein:4,carbs:27,fat:5,fiber:1,iron:1.2,calcium:15,vitc:0,b12:0,vitd:0},
Spinach:{cal:23,protein:2.9,carbs:3.6,fat:0.4,fiber:2.2,iron:2.7,calcium:99,vitc:28,b12:0,vitd:0}
};

const targets = {
protein:75,
carbs:300,
fat:70,
fiber:30,
iron:18,
calcium:1000,
vitc:90,
vitd:15,
b12:2.4
};

let logs=[];

const foodSelect=document.getElementById("food");

Object.keys(foods).forEach(f=>{
foodSelect.innerHTML+=`<option>${f}</option>`;
});

function getEnergyTarget(){
const age=+ageInput.value;
const weight=+weightInput.value;
const height=+heightInput.value;
const gender=genderInput.value;
const activity=+activityInput.value;

let bmr;

if(gender==="Male"){
bmr=10*weight+6.25*height-5*age+5;
}else{
bmr=10*weight+6.25*height-5*age-161;
}

return Math.round(bmr*activity);
}

const ageInput=document.getElementById("age");
const genderInput=document.getElementById("gender");
const activityInput=document.getElementById("activity");

function addFood(){

logs.push({
food:food.value,
qty:+qty.value,
unit:unit.value
});

renderTable();
calculate();
}

function removeFood(i){
logs.splice(i,1);
renderTable();
calculate();
}

function renderTable(){

const tbody=document.querySelector("#foodTable tbody");

tbody.innerHTML="";

logs.forEach((item,index)=>{
tbody.innerHTML+=`
<tr>
<td>${item.food}</td>
<td contenteditable="true"
onblur="logs[${index}].qty=this.innerText;calculate()">${item.qty}</td>
<td>${item.unit}</td>
<td><button onclick="removeFood(${index})">✕</button></td>
</tr>
`;
});
}

let chart;

function calculate(){

let total={
cal:0,protein:0,carbs:0,fat:0,fiber:0,
iron:0,calcium:0,vitc:0,vitd:0,b12:0
};

logs.forEach(item=>{

let factor=item.qty/100;

let f=foods[item.food];

for(let k in total){
total[k]+= (f[k]||0)*factor;
}
});

let energyTarget=getEnergyTarget();

let energyPct=Math.min(100,(total.cal/energyTarget)*100);

energyText.innerText=
`${Math.round(total.cal)} / ${energyTarget} kcal`;

energyBar.style.width=energyPct+"%";

if(chart) chart.destroy();

chart=new Chart(document.getElementById("macroChart"),{
type:"doughnut",
data:{
labels:["Protein","Carbs","Fat"],
datasets:[{
data:[
total.protein,
total.carbs,
total.fat
]
}]
},
options:{
plugins:{
legend:{
labels:{color:"white"}
}
}
}
});

let nutrientRows="";

let deficiencies=[];
let excesses=[];

Object.entries(targets).forEach(([key,target])=>{

let value=total[key]||0;

let pct=(value/target)*100;

nutrientRows+=`
<tr>
<td>${key.toUpperCase()}</td>
<td>${value.toFixed(1)}</td>
<td>${target}</td>
<td>${pct.toFixed(0)}%</td>
</tr>
`;

if(pct<80) deficiencies.push({name:key,pct});
if(pct>120) excesses.push({name:key,pct});
});

document.querySelector("#nutrientTable tbody").innerHTML=nutrientRows;

deficiencies.sort((a,b)=>a.pct-b.pct);
excesses.sort((a,b)=>b.pct-a.pct);

document.getElementById("deficiencies").innerHTML=
deficiencies.slice(0,5)
.map(d=>`<li>${d.name.toUpperCase()} (${d.pct.toFixed(0)}%)</li>`)
.join("");

document.getElementById("excesses").innerHTML=
excesses.slice(0,5)
.map(d=>`<li>${d.name.toUpperCase()} (${d.pct.toFixed(0)}%)</li>`)
.join("");

generateRecommendations(deficiencies);
}

function generateRecommendations(defs){

const diet=document.getElementById("diet").value;

let rec=[];

if(defs.some(d=>d.name==="protein")){
if(diet==="Vegetarian"){
rec.push("Add Paneer, Dal, Chana or Rajma.");
}else if(diet==="Eggetarian"){
rec.push("Add Eggs, Paneer and Dal.");
}else{
rec.push("Add Chicken, Fish or Eggs.");
}
}

if(defs.some(d=>d.name==="iron")){
rec.push("Increase Spinach, Rajma and Chana.");
}

if(defs.some(d=>d.name==="calcium")){
rec.push("Increase Milk, Curd and Paneer.");
}

if(defs.some(d=>d.name==="vitc")){
rec.push("Add Banana, Apple and Spinach.");
}

if(defs.some(d=>d.name==="vitd")){
if(diet==="Vegetarian"){
rec.push("Increase Milk and fortified dairy.");
}else{
rec.push("Include Fish and Eggs.");
}
}

if(defs.some(d=>d.name==="b12")){
if(diet==="Vegetarian"){
rec.push("Consider fortified foods or dairy.");
}else{
rec.push("Add Eggs, Fish or Chicken.");
}
}

if(rec.length===0){
rec.push("Great balance! Maintain portions.");
}

document.getElementById("recommendations").innerHTML=
rec.map(r=>`<li>${r}</li>`).join("");
}

calculate();

</script>

</body>
</html>
```
